<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PMU Bank of Clothes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">PMU Bank of Clothes</h2>
                    <p class="text-muted">Sign in to access your account</p>
                </div>
                
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label for="pmuEmail" class="form-label fw-semibold">PMU Email Address</label>
                        <input type="email" class="form-control" id="pmuEmail" name="pmuEmail" placeholder="your-email@pmu.edu.sa" required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <span class="text-muted">Don't have an account?</span> 
                    <a href="/signup.html" class="text-decoration-none fw-semibold">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
